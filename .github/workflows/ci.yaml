name: ci-golang-workflow

on:
    push:
    pull_request:
        branches:
            - develop

jobs:
    check-application:
        name: check-application (Go ${{ matrix.go }})
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                go: ["1.22.2", "1.23.x"]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: ${{ matrix.go }}
                  cache: true

            - name: Show Go version
              run: go version

            - name: Run tests
              run: go test ./...
