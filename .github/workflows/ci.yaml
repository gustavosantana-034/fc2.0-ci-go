name: ci-golang-workflow

on:
    push:
    pull_request:
        branches:
            - develop

jobs:
    test:
        name: testes (Go ${{ matrix.go }})
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                go: ["1.14", "1.23"]

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ matrix.go }}

            - name: Run tests
              run: go test ./...

    check-application:
        name: check-application
        needs: test
        if: ${{ always() }}
        runs-on: ubuntu-latest

        steps:
            - name: Confirm matrix tests passed
              run: test "${{ needs.test.result }}" = "success"
